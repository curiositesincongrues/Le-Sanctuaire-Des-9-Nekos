<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>QR Codes — Le Sanctuaire des 9 Nekos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f0f0; font-family: sans-serif; padding: 40px; }
  h1 { text-align: center; margin-bottom: 30px; font-size: 20px; color: #333; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; max-width: 900px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; padding: 24px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .card h2 { font-size: 14px; margin-bottom: 16px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .qr-wrap { display: flex; justify-content: center; align-items: center; }
  .qr-wrap canvas, .qr-wrap img { border: none !important; }
  .url { font-size: 9px; color: #aaa; margin-top: 12px; word-break: break-all; }
  .instructions { text-align: center; margin: 30px auto; max-width: 600px; color: #666; font-size: 13px; background: white; padding: 16px; border-radius: 8px; }
  @media print {
    body { background: white; padding: 10px; }
    .card { box-shadow: none; border: 1px solid #eee; break-inside: avoid; }
    .instructions { display: none; }
  }
</style>
</head>
<body>
<h1>🌸 QR Codes — Le Sanctuaire des 9 Nekos</h1>

<div class="instructions">
  Clic droit sur chaque QR code → "Enregistrer l'image" pour l'exporter en PNG.<br>
  Ou utilisez Ctrl+P pour imprimer directement.
</div>

<div class="grid" id="grid"></div>

<script>
const nekos = [
  { name: "Hanako",    seal: "qr_hanako"    },
  { name: "Raijin",    seal: "qr_raijin"    },
  { name: "Kagerou",   seal: "qr_kagerou"   },
  { name: "Amaterasu", seal: "qr_amaterasu" },
  { name: "Tamamo",    seal: "qr_tamamo"    },
  { name: "Goemon",    seal: "qr_goemon"    },
  { name: "Mugen",     seal: "qr_mugen"     },
  { name: "Hibiki",    seal: "qr_hibiki"    },
  { name: "Yamato",    seal: "qr_yamato"    },
];

const base = "https://curiositesincongrues.github.io/Le-Sanctuaire-Des-9-Nekos/?seal=";
const grid = document.getElementById('grid');

nekos.forEach(neko => {
  const url = base + neko.seal;
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<h2>${neko.name}</h2><div class="qr-wrap" id="qr-${neko.seal}"></div><div class="url">${url}</div>`;
  grid.appendChild(card);

  new QRCode(document.getElementById('qr-' + neko.seal), {
    text: url,
    width: 200,
    height: 200,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
});
</script>
</body>
</html>
